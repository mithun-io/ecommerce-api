spring:
  application:
    name: ecommerce

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT}

admin:
  name: ${ADMIN_NAME}
  email: ${ADMIN_EMAIL}
  mobile: ${ADMIN_MOBILE}
  password: ${ADMIN_PASSWORD}
